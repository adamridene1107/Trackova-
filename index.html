    <!-- ═══ JSON-LD: FAQPage ════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Comment s'organiser quand on est étudiant ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trakova centralise tes devoirs, révisions et objectifs. Tu crées des tâches quotidiennes, suis ta progression avec un calendrier et maintiens un streak de travail régulier pour rester motivé. Le mode Études inclut un Pomodoro intégré, une gestion des devoirs par deadline et des ressources adaptées."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la meilleure application de productivité gratuite ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trakova propose un essai gratuit de 7 jours sans carte bancaire avec toutes les fonctionnalités débloquées : suivi d'objectifs, gamification XP, calendrier de progression, gestion de fichiers et timer Pomodoro. Après l'essai, l'abonnement est à 6€/mois ou 64€/an."
          }
        },
        {
          "@type": "Question",
          "name": "Comment suivre ses objectifs sportifs efficacement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le mode Sport de Trakova te permet de planifier tes séances avec des templates (Push/Pull/Legs, HIIT, Yoga), de suivre ton volume d'entraînement et tes calories brûlées, et d'accéder à des ressources nutrition adaptées. Les statistiques affichent ta progression sur 30, 60 ou 90 jours."
          }
        },
        {
          "@type": "Question",
          "name": "Comment rester motivé pour atteindre ses objectifs ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trakova utilise un système de gamification avec des streaks quotidiens, des points XP et des niveaux. Plus tu travailles régulièrement, plus tu montes en niveau et débloque des badges. Cette boucle de progression rend chaque petite victoire visible et satisfaisante."
          }
        },
        {
          "@type": "Question",
          "name": "Peut-on gérer plusieurs types d'objectifs avec Trakova ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, Trakova propose 4 modes distincts : Études (devoirs, révisions, Pomodoro), Sport (séances, nutrition, progression), Projet créatif (idées, missions, inspiration) et Organisation (tâches, projets, outils). Chaque mode a ses propres onglets et outils adaptés à tes besoins."
          }
        },
        {
          "@type": "Question",
          "name": "Trakova est-il disponible sur iPhone et Android ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trakova est une Progressive Web App (PWA) accessible depuis n'importe quel navigateur sur iPhone, Android et ordinateur. Tu peux l'ajouter à ton écran d'accueil pour une expérience comme une app native, sans téléchargement sur l'App Store ou Google Play."
          }
        }
      ]
    }
    </script>
